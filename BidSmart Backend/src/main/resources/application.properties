spring.application.name=BidSmart

# PostgreSQL connection
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/bidsmart_db}
spring.datasource.username=${DB_USERNAME:bidsmart_user}
spring.datasource.password=${DB_PASSWORD:bidsmart_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Helpful for local development
server.port=${SERVER_PORT:8081}

# Frontend origin for signup calls
app.cors.allowed-origin=${FRONTEND_URL:http://localhost:8080}

# JWT
app.jwt.secret=${JWT_SECRET:BidSmartJwtSecretKeyForLocalDevelopment1234567890}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
